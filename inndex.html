<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Spinner Examples</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

  <!-- Basic Spinner -->
  <h5>Basic Spinner</h5>
  <div class="spinner-border" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>

  <!-- Colored Spinners -->
  <h5 class="mt-4">Colored Spinners</h5>
  <div class="spinner-border text-primary" role="status"></div>
  <div class="spinner-border text-success" role="status"></div>
  <div class="spinner-border text-danger" role="status"></div>
  <div class="spinner-border text-warning" role="status"></div>
  <div class="spinner-border text-info" role="status"></div>

  <!-- Growing Spinners -->
  <h5 class="mt-4">Growing Spinners</h5>
  <div class="spinner-grow text-primary" role="status"></div>
  <div class="spinner-grow text-success" role="status"></div>
  <div class="spinner-grow text-danger" role="status"></div>
  <div class="spinner-grow text-warning" role="status"></div>
  <div class="spinner-grow text-info" role="status"></div>

  <!-- Spinner Size -->
  <h5 class="mt-4">Spinner Sizes</h5>
  <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
  <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
  <div class="spinner-grow text-danger" style="width: 4rem; height: 4rem;" role="status"></div>

  <!-- Spinner Buttons -->
  <h5 class="mt-4">Spinner in Buttons</h5>
  <button class="btn btn-primary" type="button" disabled>
    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
    Loading...
  </button>

  <button class="btn btn-success" type="button" disabled>
    <span class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>
    Processing...
  </button>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
